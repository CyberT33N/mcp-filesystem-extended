catalogMode: strict

ci: true

cleanupUnusedCatalogs: true

dangerouslyAllowAllBuilds: false

dedupePeerDependents: true

disallowWorkspaceCycles: true

dlxCacheMaxAge: 1440

enablePrePostScripts: false

engineStrict: true

