
# `autoInstallPeers`
# Einfach: Verhindert automatisches Nachinstallieren fehlender Peer-Dependencies.
# Details: Peer-Entscheidungen muessen explizit im Manifest getroffen werden,
# statt stillschweigend waehrend der Installation zu passieren.
autoInstallPeers: false

